{{define "suite"}}
<div class="folder_content">
    {{range .Content}} {{if .IsDir}}

    <div class="group-container">
        <!-- checkbox cachée -->
        <input type="checkbox" id="folder-{{.Path}}" class="group-toggle" />

        <!-- header cliquable -->
        <label for="folder-{{.Path}}" class="file folder group-header">
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
            >
                <path
                    fill="var(--prim)"
                    d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"
                />
            </svg>
            {{.Name}}
        </label>

        <!-- contenu repliable -->
        <div class="group-content">{{template "suite" .}}</div>
    </div>

    {{else}}
    <a class="file" href="/project/{{$.ProjID}}/tree/{{.Path}}">
        <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
        >
            <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" />
            <path d="M14 2v4a2 2 0 0 0 2 2h4" />
        </svg>
        {{.Name}}
    </a>

    {{end}} {{end}}
</div>
{{end}}
